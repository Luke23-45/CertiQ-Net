# @package _global_
defaults:
  - /experiments/common
  - /model: certiq_index
  - /env: family_a
  - /adapter: queueing
  - /trainer: default
  - /logger: csv
  - /progress: default
  - _self_

experiment_family: main_queueing_optimized
certificate_status: exact

trainer:
  val_check_interval: 1.0
  rollout_horizon: 8
  log_every_n_steps: 5

runner:
  resample_every_epoch: false
  show_progress: false
