# @package _global_
model:
  _target_: certiqnet.models.certiqnet_p.CertiQNetP
  C_B: 5.0
  beta: 1.0
  backbone:
    alpha_min: 0.001
    beta_min: 0.001
    alpha_init: 1.0
    beta_init: 1.0
    gamma_max: 2.0
    gamma_init: 0.0
    c_init: 0.0
  encoder:
    d_local: 64
    d_global: 64
    n_layers_local: 2
    n_layers_res: 2
    hidden_dim: 128
    pooling: attention
  residual:
    R_max: 2.0
  gate:
    eta_max: 0.95
