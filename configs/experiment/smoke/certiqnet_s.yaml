defaults:
  - /model: certiqnet_s
  - /env: family_a
  - /adapter: queueing
  - /trainer: default
  - /logger: csv
  - /callbacks: default
  - /progress: default

trainer:
  max_epochs: 3
  accelerator: cpu
  devices: 1
  precision: 32-true
  val_check_interval: 1.0
  log_every_n_steps: 1
  rollout_horizon: 4

model:
  R_cert: 200.0
  beta: 1.0
  tau_smooth: 10.0
  C_B: 1.0e9

runner:
  rollout_steps: 4
  rollout_batch_size: 4
