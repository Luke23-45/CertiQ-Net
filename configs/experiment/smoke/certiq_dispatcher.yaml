defaults:
  - /model: certiq_dispatcher
  - /env: family_a
  - /adapter: queueing
  - /trainer: default
  - /logger: csv
  - /callbacks: default
  - /progress: default

trainer:
  max_epochs: 3
  accelerator: cpu
  devices: 1
  precision: 32-true
  val_check_interval: 1.0
  log_every_n_steps: 1
  rollout_horizon: 4

model:
  geometry:
    C: 5.0
  certificate:
    mode: projection
    fallback_radius: 200.0

runner:
  rollout_steps: 4
  rollout_batch_size: 4

