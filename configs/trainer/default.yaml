# @package _global_
trainer:
  max_epochs: 200
  accelerator: auto
  devices: 1
  precision: bf16-mixed
  gradient_clip_val: 0.0
  val_check_interval: 0.25
  log_every_n_steps: 10
  lr: 0.0003
  weight_decay: 0.00001
  rollout_horizon: 64
  entropy_warmup_epochs: 20
  imitation_warmup_epochs: 20
  policy_buffer_max: 4096
  policy_mix_fraction: 0.25
  teacher_mix_fraction: 0.25
  synthetic_mix_fraction: 0.5
  use_ppo: true
  ppo_clip_epsilon: 0.2
  ppo_epochs: 4
  ppo_batch_size: 64
  ppo_manual_clip_val: 1.0
