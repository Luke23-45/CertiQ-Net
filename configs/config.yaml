defaults:
  - model: certiq_index
  - env: family_a
  - adapter: queueing
  - trainer: default
  - logger: wandb
  - callbacks: default
  - progress: default
  - _self_

project:
  name: certiq-index
  seed: 42
  output_root: outputs
  experiment_name: null
  run_id: null
  resume_from_checkpoint: null
  log_dir: null
  save_checkpoints: true

runner:
  rollout_steps: 1000
  rollout_batch_size: 32
  max_backlog: 1000000.0
  show_progress: true

sweep:
  seeds: [2] # [0, 1, 2]
  models: [certiq_index]
  envs: [family_a, family_b, family_c, family_e]

loss:
  omega_bc: 1.0
  omega_usage: 0.1
  omega_certificate: 5.0
  omega_correction: 0.001
  policy_kl_weight: 0.01
  omega_ent: -0.001
  rollout_weight: 1.0
