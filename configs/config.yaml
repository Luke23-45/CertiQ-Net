defaults:
  - model: certiqnet_s
  - env: family_a
  - adapter: queueing
  - trainer: default
  - logger: wandb
  - callbacks: default
  - progress: default
  - _self_

project:
  name: certiqnet-z2
  seed: 42
  output_root: outputs
  experiment_name: null
  run_id: null
  resume_from_checkpoint: null
  log_dir: ${hydra:runtime.output_dir}
  save_checkpoints: true

runner:
  rollout_steps: 1000
  rollout_batch_size: 32
  max_backlog: 1000000.0
  show_progress: true

sweep:
  seeds: [2] # [0, 1, 2]
  models: [certiqnet_s, certiqnet_p, backbone_only, certiqnet_x_ablation]
  envs: [family_a, family_b, family_c, family_e]

loss:
  omega_bc: 1.0
  omega_gate: 0.1
  omega_drift: 5.0
  omega_res: 0.01
  omega_ent: -0.001
  rollout_weight: 1.0
